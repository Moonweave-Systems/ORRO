name: CI

on:
  push:
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ORRO repository contract
        run: python3 scripts/check_orro_repo_contract.py
      - name: Check ORRO release manifest
        run: python3 scripts/check_orro_release_manifest.py
      - name: Check ORRO packaging decision
        run: python3 scripts/check_orro_packaging_decision.py
      - name: Check ORRO fallback policy
        run: python3 scripts/check_orro_fallback_policy.py
      - name: Check ORRO command migration
        run: python3 scripts/check_orro_command_migration.py
      - name: Check ORRO wrapper
        run: python3 scripts/check_orro_wrapper.py
      - name: Check ORRO wrapper install
        run: python3 scripts/check_orro_wrapper_install.py --json
      - name: Check ORRO wrapper distribution
        run: python3 scripts/check_orro_wrapper_distribution.py --json
      - name: Compile scripts
        run: python3 -m py_compile scripts/check_orro_repo_contract.py scripts/check_orro_release_manifest.py scripts/check_orro_packaging_decision.py scripts/check_orro_fallback_policy.py scripts/check_orro_command_migration.py scripts/check_orro_wrapper.py scripts/check_orro_wrapper_install.py scripts/check_orro_wrapper_distribution.py scripts/orro_e2e_smoke.py scripts/update_orro_engine_lock.py scripts/bootstrap_orro.py src/orro_wrapper/__init__.py src/orro_wrapper/__main__.py src/orro_wrapper/cli.py
      - name: Wrapper self-test
        run: PYTHONPATH=src python3 -m orro_wrapper self-test
      - name: Wrapper install self-test
        run: python3 scripts/check_orro_wrapper_install.py --self-test
      - name: Wrapper distribution self-test
        run: python3 scripts/check_orro_wrapper_distribution.py --self-test
      - name: E2E smoke self-test
        run: python3 scripts/orro_e2e_smoke.py --self-test
      - name: Engine-lock update helper self-test
        run: python3 scripts/update_orro_engine_lock.py --self-test
      - name: Bootstrap helper self-test
        run: python3 scripts/bootstrap_orro.py --self-test
      - name: Check whitespace
        run: git diff --check
