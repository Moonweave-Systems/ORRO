[metadata]
name = orro-product-wrapper
version = 0.0.0
description = ORRO product/distribution wrapper skeleton for pinned Depone and witnessd engines.
long_description = file: README.md
long_description_content_type = text/markdown

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.10
install_requires =

[options.packages.find]
where = src

[options.entry_points]
console_scripts =
    orro-wrapper = orro_wrapper.cli:main
